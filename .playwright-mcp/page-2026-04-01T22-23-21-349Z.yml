        - generic [ref=e86]:
          - generic [ref=e87]: WebAIM Accessibility Testing Services
          - paragraph [ref=e88]: Web accessibility testing can be difficult! The experts at WebAIM can audit your web site and provide a detailed report to help you remediate accessibility and WCAG compliance issues.
          - paragraph [ref=e89]:
            - link "Learn more about WebAIM Evaluation Services" [ref=e90] [cursor=pointer]:
              - /url: /services/evaluation
        - heading "Explanation" [level=2] [ref=e91]
        - paragraph [ref=e92]: Enter a foreground and background color in RGB hexadecimal format or choose a color using the Color Picker. Enter an Alpha value to adjust the transparency of the foreground color. Use the Lightness slider to adjust the perceived lightness of the color.
        - paragraph [ref=e93]: WCAG 2.0 level AA requires a contrast ratio of at least 4.5:1 for normal text and 3:1 for large text. WCAG 2.1 requires a contrast ratio of at least 3:1 for graphics and user interface components (such as form input borders). WCAG Level AAA requires a contrast ratio of at least 7:1 for normal text and 4.5:1 for large text.
        - paragraph [ref=e94]: Large text is defined as 14 point (typically 18.66px) and bold or larger, or 18 point (typically 24px) or larger.
        - paragraph [ref=e95]:
          - strong [ref=e96]: "Hint:"
          - text: Use the eye dropper tool in the Color Picker to extract the color value from any element on screen. Additionally,
          - link "WAVE" [ref=e97] [cursor=pointer]:
            - /url: http://wave.webaim.org/
          - text: can analyze contrast ratios for all page text elements at once.
        - paragraph [ref=e98]:
          - text: Use
          - link "our link contrast checker" [ref=e99] [cursor=pointer]:
            - /url: /resources/linkcontrastchecker/?fcolor=3A7D00&bcolor=F5F0EB
          - text: to evaluate links that are identified using color alone.
        - generic [ref=e100]:
          - generic [ref=e101]: Contrast Checker API and Bookmarklet
          - paragraph [ref=e102]:
            - text: This tool also functions as a basic API. Simply append
            - code [ref=e103]: "&api"
            - text: to any
            - link "permalink" [ref=e104] [cursor=pointer]:
              - /url: ./?fcolor=3A7D00&bcolor=F5F0EB
            - text: "to get a JSON object with the contrast ratio and the AA/AAA pass/fail states. For example:"
            - link "https://webaim.org/resources/contrastchecker/?fcolor=3A7D00&bcolor=F5F0EB&api" [ref=e105] [cursor=pointer]:
              - /url: ./?fcolor=3A7D00&bcolor=F5F0EB&api
            - text: .
          - paragraph [ref=e106]:
            - text: A miniature version of this Contrast Checker can be initiated within any web page by installing and using the
            - link "Contrast Checker Bookmarklet" [ref=e107] [cursor=pointer]:
              - /url: bookmarklet
            - text: . This tool allows easy contrast testing of any content on your screen by using the foreground and background eyedropper tools.
